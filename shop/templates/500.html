<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xəta baş verdi — Şirin Anlar</title>
    <style>
        /* Bu şablon Tailwind build-i işə düşmədiyi hallarda belə göstərilməlidir,
           ona görə heç bir xarici CSS-dən asılı olmayan minimal, inline stil istifadə edilib. */
        body { font-family: system-ui, sans-serif; background: #fbf4ea; color: #3a2a20; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 2rem; }
        .box { max-width: 420px; }
        h1 { color: #6e3b24; margin-bottom: .75rem; }
        a { color: #a9603b; font-weight: 700; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Nə isə səhv getdi</h1>
        <p>Üzr istəyirik, gözlənilməz bir xəta baş verdi. Zəhmət olmasa bir az sonra yenidən cəhd edin.</p>
        <p><a href="/">Ana səhifəyə qayıt</a></p>
    </div>
</body>
</html>
